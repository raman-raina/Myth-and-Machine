<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My ML Project</title>
</head>
<body bgcolor="#f9fafb" text="#222" link="#0070f3" vlink="#0059c1" alink="#ff0000">

  <!-- Header -->
  <table width="100%" bgcolor="white" cellpadding="15" cellspacing="0" border="0">
    <tr>
      <td>
        <font face="Arial" size="6" color="#0070f3"><b>Rune Image Classifier</b></font>
      </td>
      <td align="right">
        <a href="#about"><font face="Arial" size="4" color="#444">About</font></a> |
        <a href="#dataset"><font face="Arial" size="4" color="#444">Dataset</font></a> |
        <a href="#results"><font face="Arial" size="4" color="#444">Results</font></a> |
        <a href="#future"><font face="Arial" size="4" color="#444">Future Work</font></a>
      </td>
    </tr>
  </table>

  <!-- Main -->
  <center>
    <table width="80%" cellpadding="20" cellspacing="0" border="1" bordercolor="#ddd" bgcolor="white">
      <tr>
        <td>
          <a name="about"></a>
          <font face="Arial" size="5" color="#0070f3"><b>About</b></font>
          <p><font face="Arial" size="3" color="#555">
            <!-- About content here -->
          </font></p>
        </td>
      </tr>
    </table>

    <br>

    <!-- Demo Section -->
    <table width="80%" cellpadding="20" cellspacing="0" border="1" bordercolor="#ddd" bgcolor="white">
      <tr>
        <td>
          <a name="demo"></a>
          <font face="Arial" size="5" color="#0070f3"><b>Upload Image</b></font>
          <p><font face="Arial" size="3" color="#555">
            Drag and drop an image below or select a file by path.
          </font></p>

          <!-- Drag and Drop Box -->
          <div id="drop-area" style="border: 2px dashed #ccc; border-radius: 10px; width: 100%; height: 150px; display: flex; justify-content: center; align-items: center; color: #ccc; text-align: center;">
            Drag & Drop Image Here
          </div>

          <br>

          <!-- File Input -->
          <input type="file" id="file-input">
          <div id="filepath-box" style="margin-top: 10px; font-weight: bold;"></div>

          <br>

          <input type="button" value="Submit" onclick="sendData()" style="background:#0070f3;color:white;padding:10px 20px;border:none;margin-top:10px;">
          <p><font face="Arial" size="3">Result: <b><span id="output"></span></b></font></p>

        </td>
      </tr>
    </table>
  </center>

  <br>

  <!-- Footer -->
  <center>
    <font face="Arial" size="2" color="#777">
      Made by Raman Raina | 
      <a href="https://github.com/yourusername"><font color="#0070f3">GitHub</font></a>
    </font>
  </center>

  <script>
    const dropArea = document.getElementById('drop-area');
    const fileInput = document.getElementById('file-input');
    const filepathBox = document.getElementById('filepath-box');

    let selectedFile = null;

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
      dropArea.addEventListener(eventName, e => e.preventDefault());
      document.body.addEventListener(eventName, e => e.preventDefault());
    });

    ['dragenter', 'dragover'].forEach(eventName => {
      dropArea.addEventListener(eventName, () => {
        dropArea.style.borderColor = '#6c6';
        dropArea.style.color = '#6c6';
      });
    });

    ['dragleave', 'drop'].forEach(eventName => {
      dropArea.addEventListener(eventName, () => {
        dropArea.style.borderColor = '#ccc';
        dropArea.style.color = '#ccc';
      });
    });

    dropArea.addEventListener('drop', (e) => {
      const files = e.dataTransfer.files;
      handleFile(files[0]);
    });

    fileInput.addEventListener('change', (e) => {
      const files = e.target.files;
      handleFile(files[0]);
    });

    function handleFile(file) {
      if (file && file.type.startsWith('image/')) {
        selectedFile = file;
        filepathBox.textContent = `File Name: ${file.name}`;
      } else {
        alert("Please select or drop an image file.");
        selectedFile = null;
        filepathBox.textContent = "";
      }
    }

    function sendData() {
      if (!selectedFile) {
        document.getElementById('output').textContent = "No image selected.";
        return;
      }
      document.getElementById('output').textContent = "A"; // Placeholder
    }
  </script>
</body>
</html>
